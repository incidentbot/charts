{{- $appMode := default "bot" .Values.appMode }}
{{- $apiEnabled := or (eq $appMode "api") (eq $appMode "all") }}
{{- if and .Values.service.enabled $apiEnabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "incident-bot.fullname" . }}
  labels:
    {{- include "incident-bot.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "incident-bot.selectorLabels" . | nindent 4 }}
{{- end }}
