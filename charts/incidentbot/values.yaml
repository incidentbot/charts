# Default values for incidentbot.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

affinity: {}

args: []

# Optional explicit command override. If empty, command is derived from appMode.
command: []

configMap:
  create: false
  data: {}

database:
  enabled: false
  user: incident_bot
  password:

deploymentAnnotations: {}

envFromSecret:
  enabled: false
  secretName:

envVars: {}

extraContainers: []

extraPodLabels: {}

healthCheck:
  enabled: true
  path: /api/v1/health
  scheme: HTTP
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 1

image:
  repository: ghcr.io/incidentbot/incidentbot
  pullPolicy: Always
  # CalVer format: YYYY.MM.DD (e.g. 2026.06.01) or sha-<short>
  tag: latest

imagePullSecrets: []

ingress:
  enabled: false
  className: ''
  annotations: {}
  hosts:
    - host:
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

nodeSelector: {}

podAnnotations: {}

podSecurityContext: {}

resources:
  limits:
    cpu: 500m
    memory: 512M
  requests:
    cpu: 250m
    memory: 128M

securityContext: {}

service:
  enabled: false
  type: ClusterIP
  port: 3000

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ''

tolerations: []
